    <g transform="rotate(-30 150 334)"><rect x="52" y="320" width="98" height="27" rx="13.5" fill="url(#iYellowH)"/><circle cx="68" cy="333.5" r="5.5" fill="#fff" opacity="0.9"/></g>
    <g transform="rotate(-8 150 368)"><rect x="62" y="354" width="88" height="27" rx="13.5" fill="url(#iPinkH)"/><circle cx="78" cy="367.5" r="5.5" fill="#fff" opacity="0.85"/></g>
